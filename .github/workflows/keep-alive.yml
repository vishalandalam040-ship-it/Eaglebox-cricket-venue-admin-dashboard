name: Keep Backend Alive

on:
  schedule:
    # Runs every 14 minutes to prevent Render free tier from spinning down
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend API
        run: curl -s https://eaglebox-cricket-venue-admin-dashboard-1.onrender.com/api/health
